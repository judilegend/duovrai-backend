# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path additions will be prepended to sys.path.
# defaults to the current working directory, which is suitable to cleanup.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# string_format = %%Y-%%m-%%d_%%H-%%M-%%S

# version path separator; as of Alembic 1.3.0 this defaults to ';'
# but can be ',' for backward compatibility.
# version_path_separator = ;

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
